<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Employee Registration</h1>
    <p>{{ message }}</p>
    <form action="" method="post">
        {% csrf_token %}
        <input type="text" name="uname" placeholder="Username" autocomplete="off"><br>
        <input type="email" name="uemail" placeholder="Email" autocomplete="off"><br>
        <input type="password" name="upassword" placeholder="Password" autocomplete="off"><br>
        <input type="password" name="uconpassword" placeholder="Conform password" autocomplete="off"><br>
        <input type="submit" value="submit">
    </form>
    <br>
    <a href="{% url 'kok' %}">Login</a>
</body>
</html>
